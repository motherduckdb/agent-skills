name: Validate Code Snippets

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - 'tests/validate_snippets.py'
      - 'tests/_lib/**'
      - 'tests/ts_syntax_check.js'
      - '.github/workflows/validate-snippets.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-snippets:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install duckdb pyyaml

      - name: Install Node.js dependencies
        run: npm install

      - name: Run snippet validation
        id: validate
        run: python tests/validate_snippets.py
        continue-on-error: true

      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errorsFile = 'snippet-errors.json';

            let body = '';

            if (fs.existsSync(errorsFile)) {
              const errors = JSON.parse(fs.readFileSync(errorsFile, 'utf8'));

              if (errors.length === 0) {
                body = '### ✅ Code Snippet Validation Passed\n\nAll code snippets in markdown files passed syntax validation.';
              } else {
                body = `### ❌ Code Snippet Validation Failed\n\n**${errors.length} snippet(s)** have errors:\n\n`;
                body += '| File | Line | Language | Error |\n|------|------|----------|-------|\n';

                for (const err of errors) {
                  const escapedMsg = err.message
                    .replace(/\|/g, '\\|')
                    .replace(/\n/g, '<br>')
                    .substring(0, 200);
                  body += `| \`${err.file}\` | ${err.line} | \`${err.language}\` | ${escapedMsg} |\n`;
                }

                body += '\n> Use `<!-- snippet-skip-next -->` before a code fence to exclude a block from validation.';
              }
            } else {
              body = '### ⚠️ Code Snippet Validation\n\nNo validation results file found. The validation script may have crashed.';
            }

            const marker = '<!-- snippet-validation-result -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if validation found errors
        if: steps.validate.outcome == 'failure'
        run: exit 1
