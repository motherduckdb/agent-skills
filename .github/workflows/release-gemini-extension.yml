name: Attach Gemini Extension Archive

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-gemini-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Gemini extension archive
        run: python3 scripts/package_gemini_extension.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: release/motherduck-skills.tar.gz
