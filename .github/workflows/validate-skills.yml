name: Validate Skills and Plugins

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'ARCHITECTURE.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'commands/**'
      - 'docs/**'
      - 'gemini-extension.json'
      - 'skills/**'
      - 'plugins/motherduck-skills/**'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/check_codex_plugin_sync.py'
      - 'scripts/package_gemini_extension.py'
      - 'scripts/sync_codex_plugin.py'
      - 'scripts/validate_skills.py'
      - '.github/workflows/release-gemini-extension.yml'
      - '.github/workflows/validate-skills.yml'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'ARCHITECTURE.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'README.md'
      - 'commands/**'
      - 'docs/**'
      - 'gemini-extension.json'
      - 'skills/**'
      - 'plugins/motherduck-skills/**'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/check_codex_plugin_sync.py'
      - 'scripts/package_gemini_extension.py'
      - 'scripts/sync_codex_plugin.py'
      - 'scripts/validate_skills.py'
      - '.github/workflows/release-gemini-extension.yml'
      - '.github/workflows/validate-skills.yml'

permissions:
  contents: read

jobs:
  validate-skills-and-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Validate skills plus Claude and Codex plugin wiring
        run: uv run scripts/validate_skills.py

      - name: Verify packaged Codex plugin matches source skills
        run: uv run scripts/check_codex_plugin_sync.py

      - name: Build Gemini extension archive
        run: python3 scripts/package_gemini_extension.py
