name: Validate Skills Catalog

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/validate_skills.py'
      - '.github/workflows/validate-skills.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/validate_skills.py'
      - '.github/workflows/validate-skills.yml'

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run structural validator
        run: uv run scripts/validate_skills.py
