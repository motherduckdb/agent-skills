name: Validate Skills and Plugins

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'ARCHITECTURE.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'HARNESSES.md'
      - 'README.md'
      - 'commands/**'
      - 'docs/**'
      - 'gemini-extension.json'
      - 'skills/**'
      - 'plugins/motherduck-skills-claude/**'
      - 'plugins/motherduck-skills/**'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/_lib/**'
      - 'scripts/*.py'
      - '.github/workflows/release-gemini-extension.yml'
      - '.github/workflows/validate-skills.yml'
  push:
    branches: [main]
    paths:
      - 'AGENTS.md'
      - 'ARCHITECTURE.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'HARNESSES.md'
      - 'README.md'
      - 'commands/**'
      - 'docs/**'
      - 'gemini-extension.json'
      - 'skills/**'
      - 'plugins/motherduck-skills-claude/**'
      - 'plugins/motherduck-skills/**'
      - '.claude-plugin/**'
      - '.codex-plugin/**'
      - '.agents/plugins/**'
      - 'scripts/_lib/**'
      - 'scripts/*.py'
      - '.github/workflows/release-gemini-extension.yml'
      - '.github/workflows/validate-skills.yml'

permissions:
  contents: read

jobs:
  validate-skills-and-plugins:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate skills plus Claude and Codex plugin wiring
        run: uv run scripts/validate_skills.py

      - name: Validate Claude marketplace manifest
        run: claude plugin validate ./.claude-plugin/marketplace.json

      - name: Validate packaged Claude plugin
        run: claude plugin validate ./plugins/motherduck-skills-claude

      - name: Verify packaged Codex plugin matches source skills
        run: uv run scripts/check_codex_plugin_sync.py

      - name: Verify packaged Claude plugin matches source skills
        run: uv run scripts/check_claude_plugin_sync.py

      - name: Build Gemini extension archive
        run: python3 scripts/package_gemini_extension.py
